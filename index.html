<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'none'; img-src 'none'; font-src 'none';">
    <title>Pass Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
    <script src="lib/anime.min.js"></script>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="layout">
        <div class="header">
            <h1>&#128274; Password Generator</h1>
            <p class="subtitle">Secure passwords generated locally &mdash; never stored or shared.</p>
        </div>

        <div class="main">
            <div class="controls">
                <div class="control-row slider-row">
                    <label for="length">Length</label>
                    <div class="slider-container">
                        <input type="range" id="length-slider" min="3" max="30" value="6" />
                        <input type="number" id="length" value="6" min="3" max="30" autocomplete="off" />
                    </div>
                </div>
                <div class="control-row">
                    <label for="number">Numbers</label>
                    <input type="number" id="number" value="0" min="0" max="30" autocomplete="off" />
                </div>
                <div class="control-row">
                    <label for="special">Special chars</label>
                    <input type="number" id="special" value="0" min="0" max="30" autocomplete="off" />
                </div>
                <div class="control-row">
                    <label for="case">Case</label>
                    <select id="case">
                        <option value="both">Both (Aa)</option>
                        <option value="upper">Upper (AA)</option>
                        <option value="lower">Lower (aa)</option>
                    </select>
                </div>
                <div class="control-row checkbox-row">
                    <label for="save-history" class="checkbox-label">
                        <input type="checkbox" id="save-history" />
                        <span>Save history</span>
                    </label>
                </div>
                <p id="validation-msg"></p>
            </div>

            <div class="buttons">
                <button id="btn-generate" type="button" title="Generate a new password">Generate</button>
                <button id="btn-copy" class="secondary" type="button" title="Copy password to clipboard">Copy</button>
            </div>

            <div id="result-box">
                <span id="result">&#8212;</span>
                <button id="btn-toggle-visibility" type="button" title="Toggle visibility" class="toggle-visibility hidden">
                    <span class="visibility-icon"></span>
                </button>
            </div>
            <div id="strength-container" class="strength-container">
                <div class="strength-bar">
                    <div id="strength-fill"></div>
                </div>
                <span id="strength-text"></span>
            </div>

            <div id="history-section" class="history-section hidden">
                <div class="history-header" id="history-toggle">
                    <span>Recent passwords</span>
                    <span id="history-count"></span>
                    <span id="history-arrow">▼</span>
                </div>
                <ul id="history-list"></ul>
                <button id="btn-clear-history" class="secondary small" type="button">Clear</button>
            </div>
        </div>

        <div class="footer">
            <small>
                &copy; <span id="year"></span> <a href="https://github.com/moy2125" target="_blank" rel="noopener noreferrer">moy2125</a>
            </small>
        </div>
    </section>
</body>
</html>
