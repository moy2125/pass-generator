<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; style-src 'self'; connect-src 'none'; img-src 'none'; font-src 'none';">
    <title>Pass Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" integrity="sha512-z4OUqw38qNLpn1libAN9BsoDx6nbNFio5lA6CuTp9NlK83b89hgyCVq+N5FdBJptINztxn1Z3SaKSKUS5UP60Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="layout">
        <div class="header">
            <h1>&#128274; Password Generator</h1>
            <p class="subtitle">Secure passwords generated locally &mdash; never stored or shared.</p>
        </div>

        <div class="main">
            <div class="controls">
                <div class="control-row">
                    <label for="length">Length</label>
                    <input type="number" id="length" value="6" min="3" max="30" autocomplete="off" oninput="validateInputs()" />
                </div>
                <div class="control-row">
                    <label for="number">Numbers</label>
                    <input type="number" id="number" value="0" min="0" max="30" autocomplete="off" oninput="validateInputs()" />
                </div>
                <div class="control-row">
                    <label for="special">Special chars</label>
                    <input type="number" id="special" value="0" min="0" max="30" autocomplete="off" oninput="validateInputs()" />
                </div>
                <p id="validation-msg"></p>
            </div>

            <div class="buttons">
                <button id="button" type="button" onclick="generatePassword()" title="Generate a new password">Generate</button>
                <button id="copy" class="secondary" type="button" onclick="copyPassword()" title="Copy password to clipboard">Copy</button>
            </div>

            <div id="result-box">
                <span id="result">&#8212;</span>
            </div>
        </div>

        <div class="footer">
            <small>
                &copy; 2025 <a href="https://github.com/moy2125" target="_blank" rel="noopener noreferrer">moy2125</a>
            </small>
        </div>
    </section>
</body>
</html>
